# Langfuse 自托管栈（可观测性）—— 独立于主项目，单独 up/down。
#
# 启动：docker compose -f docker-compose.langfuse.yml up -d
# 停止：docker compose -f docker-compose.langfuse.yml down
# 首次访问 http://localhost:3001 注册账号 → 建 project → 拿 public/secret key 填进 .env.local
#
# 端口说明：langfuse web = 3001（避开项目 Next.js 的 3000）。
# 密钥生成（bash）：openssl rand -hex 32  分别填 NEXTAUTH_SECRET / SALT / ENCRYPTION_KEY。
# 镜像 tag 用主版本 :3；若拉取失败可 pin 到具体小版本（如 3.128.0）。

services:
  langfuse-web:
    image: langfuse/langfuse:3
    depends_on:
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      minio: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: CHANGE_ME_openssl_rand_hex_32
      SALT: CHANGE_ME_openssl_rand_hex_32
      ENCRYPTION_KEY: CHANGE_ME_openssl_rand_hex_32 # 必须 64 位 hex
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      REDIS_CONNECTION_STRING: redis://default:redis@redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    depends_on:
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      minio: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/langfuse
      SALT: CHANGE_ME_openssl_rand_hex_32
      ENCRYPTION_KEY: CHANGE_ME_openssl_rand_hex_32
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      REDIS_CONNECTION_STRING: redis://default:redis@redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

  postgres:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse_ch_data:/var/lib/clickhouse
      - langfuse_ch_logs:/var/log/clickhouse-server

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "9091:9001" # MinIO 控制台（避开常见端口）
    volumes:
      - langfuse_minio:/data

  redis:
    image: redis:7
    command: --requirepass redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  langfuse_pg:
  langfuse_ch_data:
  langfuse_ch_logs:
  langfuse_minio:
